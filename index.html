<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASCII Animation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
            cursor: crosshair;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background-color: black;
        }
    </style>
</head>
<body>
<canvas id="asciiCanvas"></canvas>
<script>
    const config = {
        useWaveAnimation: true,

        enableMouseInteraction: true,
        enableObstaclePush: false,
        obstaclePushStrength: 1.5,
        mouseInfluenceRadius: 150,

        enableObstaclePush: false,
        obstacleRadius: 100,    
        obstacleStrength: 1.5,

        enableObstacleFade: false,
        obstacleLifespan:150,
        
        enableMouseTrail: true,
        trailLifespan: 150,

        baseLightness: 15,
        maxLightness: 75,
    };

    if (config.useWaveAnimation) {
        const canvas = document.getElementById('asciiCanvas');
        const ctx = canvas.getContext('2d');
        const asciiChars = [' ', '.', ',', ':', ';', '-', '_', '~', '=', '+', '*', 'o', 'x', '%', '#', '&', '8', 'B', '@'];
        const fontSize = 20;
        let columns = Math.floor(window.innerWidth / fontSize);
        let rows = Math.floor(window.innerHeight / fontSize);
        let frame = 0;

        let mouseX = -1000;
        let mouseY = -1000;

        let obstacles = [];

        let isDrawing = false;
        let isErasing = false;
        let lastDrawX = -1000;
        let lastDrawY = -1000;
        let lastTrailX = -1000;
        let lastTrailY = -1000;

        const drawSpacing = 20;
        const eraseRadius = 60;

        if (config.enableMouseInteraction) {
            window.addEventListener('contextmenu', (e) => {
                e.preventDefault();
            });

            window.addEventListener('mouseout', () => {
                mouseX = -1000;
                mouseY = -1000;
                isDrawing = false;
                isErasing = false;
                lastTrailX = -1000;
                lastTrailY = -1000;
            });

            window.addEventListener('mousedown', (e) => {
                if (e.button === 0) {
                    isDrawing = true;
                    addObstacle(e.clientX, e.clientY, !config.enableObstacleFade, false);
                } else if (e.button === 1) {
                    obstacles = [];    
                } else if (e.button === 2) {
                    isErasing = true;
                    eraseObstacles(e.clientX, e.clientY);
                }
            });

            window.addEventListener('mouseup', (e) => {
                if (e.button === 0) {
                    lastDrawX = -1000;
                    lastDrawY = -1000;
                    isDrawing = false;
                }
                if (e.button === 2) isErasing = false;
            });

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                if (config.enableMouseTrail) {
                    addObstacle(e.clientX, e.clientY, false, true);
                }
                if (isDrawing) {
                    addObstacle(e.clientX, e.clientY, !config.enableObstacleFade, false);
                } else if (isErasing) {
                    eraseObstacles(e.clientX, e.clientY);
                }
            });
        }

        function addObstacle(x, y, isPermanent) {
            let lastX = isPermanent ? lastDrawX : lastTrailX;
            let lastY = isPermanent ? lastDrawY : lastTrailY;

            if (lastX === -1000 || lastY === -1000) {
                obstacles.push({ x: x, y: y, lifespan: isPermanent ? config.obstacleLifespan : config.trailLifespan, permanent: isPermanent });
                if (isPermanent) { lastDrawX = x; lastDrawY = y; } 
                else { lastTrailX = x; lastTrailY = y; }
                return;
            }

            let dx = x - lastX;
            let dy = y - lastY;
            let distance = Math.hypot(dx, dy);

            if (distance >= drawSpacing) {
                let steps = Math.floor(distance / drawSpacing);
                let stepX = dx / steps;
                let stepY = dy / steps;

                for (let i = 1; i <= steps; i++) {
                    let nx = lastX + (stepX * i);
                    let ny = lastY + (stepY * i);
                    obstacles.push({ x: nx, y: ny, lifespan: isPermanent ? config.obstacleLifespan : config.trailLifespan, permanent: isPermanent });
                }

                if (isPermanent) { lastDrawX = x; lastDrawY = y; } 
                else { lastTrailX = x; lastTrailY = y; }
            }
        }

        function eraseObstacles(x, y) {
            obstacles = obstacles.filter(obs => Math.hypot(obs.x - x, obs.y - y) > eraseRadius);
        }

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        ctx.textBaseline = 'top';

        function getAsciiChar(value) {
            const clampedValue = Math.max(0, Math.min(255, value));
            return asciiChars[Math.floor(clampedValue / 255 * (asciiChars.length - 1))];
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = `${fontSize}px monospace`;

            const mouseRadiusSq = config.mouseInfluenceRadius * config.mouseInfluenceRadius;
            const obsRadiusSq = config.obstacleRadius * config.obstacleRadius;

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < columns; x++) {
                    const horizontalSwell = Math.sin(x * 0.05 - frame * 0.005);
                    const verticalSway = Math.cos(y * 0.05 - frame * 0.006);    
                    const diagonalChop = Math.sin((x - y) * 0.04 + frame * 0.007) * 0.5; 
                    
                    let wave = (horizontalSwell + verticalSway + diagonalChop) / 2.5;

                    let offsetX = horizontalSwell * (fontSize *0.8);
                    let offsetY = verticalSway * (fontSize *0.8);

                    const charPixelX = x * fontSize + offsetX;
                    const charPixelY = y * fontSize + offsetY;

                    const dx = charPixelX - mouseX;
                    const dy = charPixelY - mouseY;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    const influenceRadius = config.mouseInfluenceRadius;
                    let maxInfluence = 0;
                    let pushOffsetX = 0;
                    let pushOffsetY = 0;

                    if (mouseX !== -1000) {
                        let dx = charPixelX - mouseX;
                        let dy = charPixelY - mouseY;
                        let distSq = dx * dx + dy * dy;
                        if (distSq < mouseRadiusSq) {
                            let distance = Math.sqrt(distSq);
                            let inf = (config.mouseInfluenceRadius - distance) / config.mouseInfluenceRadius;
                            maxInfluence = Math.max(maxInfluence, inf);
                        }
                    }
                    
                    let obsRadius = config.obstacleRadius;
                    for (let i = 0; i < obstacles.length; i++) {
                        let dx = charPixelX - obstacles[i].x;
                        let dy = charPixelY - obstacles[i].y;
                        let distSq = dx * dx + dy * dy;
                        
                        if (distSq < obsRadiusSq) {
                            let distance = Math.sqrt(distSq);
                            let inf = (config.obstacleRadius - distance) / config.obstacleRadius;

                            if (!obstacles[i].permanent) {
                                inf *= (obstacles[i].lifespan / config.trailLifespan);
                            }

                            maxInfluence = Math.max(maxInfluence, inf);
                            
                            if (config.enableObstaclePush) {
                                pushOffsetX -= (dx / distance) * inf * fontSize * config.obstacleStrength;
                                pushOffsetY -= (dy / distance) * inf * fontSize * config.obstacleStrength;
                            }
                        }
                    }

                    wave += maxInfluence * 1.2;
                    offsetX += pushOffsetX;
                    offsetY += pushOffsetY;

                    const rawValue = wave * 127 + 128;
                    const value = Math.max(0, Math.min(255, rawValue));
                    const char = getAsciiChar(value);

                let hue = 200;
                let lightness = config.baseLightness + (value / 255) * (config.maxLightness - config.baseLightness);

                    if (maxInfluence > 0) {
                        hue = 200 - (maxInfluence * 40);
                        lightness += maxInfluence * 30;
                    } else if (value > 220) { 
                        lightness = 80 + ((value - 220) / 35) * 20;
                    }

                    ctx.fillStyle = `hsl(${hue}, 100%, ${lightness}%)`;
                    ctx.fillText(char, (x * fontSize) + offsetX, (y * fontSize) + offsetY);
                }
            }
            for (let i = 0; i < obstacles.length; i++) {
                if (!obstacles[i].permanent) {
                    obstacles[i].lifespan--;
                }
            }
            obstacles = obstacles.filter(obs => obs.permanent || obs.lifespan > 0);

            frame++;
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = Math.floor(window.innerWidth / fontSize);
            rows = Math.floor(window.innerHeight / fontSize);
            ctx.textBaseline = 'top';
        });

        animate();
    } else {
        const canvas = document.getElementById('asciiCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()_+~|}{[]:;?><,./-='.split('');
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = characters[Math.floor(Math.random() * characters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                    
                drops[i]++;
            }
        }

        setInterval(draw, 33); 

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    }
</script>
</body>
